<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | xX Trading Journal</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#000; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { width:100%; max-width:440px; background:#0d0d0d; border:1px solid rgba(255,255,255,0.07); border-radius:16px; padding:40px 36px; }
        .logo { font-size:42px; font-weight:800; letter-spacing:-2px; text-align:center; margin-bottom:4px; }
        .tagline { text-align:center; font-size:12px; color:rgba(255,255,255,0.3); letter-spacing:1px; margin-bottom:32px; }
        .form-title { font-size:18px; font-weight:700; margin-bottom:6px; }
        .form-sub { font-size:13px; color:rgba(255,255,255,0.4); margin-bottom:24px; }
        .form-group { margin-bottom:15px; }
        label { display:block; font-size:11px; font-weight:600; letter-spacing:0.8px; color:rgba(255,255,255,0.45); margin-bottom:7px; }
        input, select { width:100%; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:8px; padding:13px 14px; color:#fff; font-size:14px; font-family:'Inter',sans-serif; transition:all 0.2s; }
        input:focus, select:focus { outline:none; border-color:rgba(255,255,255,0.3); background:rgba(255,255,255,0.07); }
        input::placeholder { color:rgba(255,255,255,0.2); }
        option { background:#111; }
        .two-col { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
        .pw-strength { margin-top:6px; display:flex; gap:4px; }
        .pw-bar { flex:1; height:3px; border-radius:2px; background:rgba(255,255,255,0.1); transition:background 0.3s; }
        .pw-bar.weak   { background:#E22134; }
        .pw-bar.fair   { background:#ffd600; }
        .pw-bar.strong { background:#1DB954; }
        .pw-label { font-size:11px; color:rgba(255,255,255,0.35); margin-top:5px; }
        .terms { display:flex; gap:10px; align-items:flex-start; font-size:12px; color:rgba(255,255,255,0.4); margin:16px 0; line-height:1.6; }
        .terms input[type="checkbox"] { width:16px; height:16px; flex-shrink:0; margin-top:1px; accent-color:#fff; }
        .btn-primary { width:100%; background:#fff; color:#000; border:none; border-radius:8px; padding:14px; font-size:14px; font-weight:700; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; letter-spacing:0.5px; }
        .btn-primary:hover { background:rgba(255,255,255,0.88); }
        .btn-primary:disabled { opacity:0.4; cursor:not-allowed; }
        .divider { display:flex; align-items:center; gap:12px; margin:20px 0; color:rgba(255,255,255,0.2); font-size:12px; }
        .divider::before,.divider::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.08); }
        .switch-link { text-align:center; font-size:13px; color:rgba(255,255,255,0.4); }
        .switch-link a { color:#fff; font-weight:600; text-decoration:none; cursor:pointer; }
        .error-box { background:rgba(226,33,52,0.1); border:1px solid rgba(226,33,52,0.3); border-radius:8px; padding:12px 14px; font-size:13px; color:#ff6b6b; margin-bottom:16px; display:none; }
        .success-box { background:rgba(29,185,84,0.1); border:1px solid rgba(29,185,84,0.25); border-radius:8px; padding:12px 14px; font-size:13px; color:#1DB954; margin-bottom:16px; display:none; line-height:1.6; }
        .spinner { display:inline-block; width:16px; height:16px; border:2px solid rgba(0,0,0,0.3); border-top-color:#000; border-radius:50%; animation:spin 0.7s linear infinite; vertical-align:middle; margin-right:6px; }
        @keyframes spin { to { transform:rotate(360deg); } }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">xX</div>
    <div class="tagline">TRADING JOURNAL</div>
    <div class="form-title">Create your account</div>
    <div class="form-sub">Start journaling your trades with discipline.</div>
    <div class="error-box"   id="errorBox"></div>
    <div class="success-box" id="successBox"></div>

    <div class="two-col">
        <div class="form-group">
            <label>FIRST NAME</label>
            <input type="text" id="firstName" placeholder="Ibrahim">
        </div>
        <div class="form-group">
            <label>ALIAS / CALLSIGN</label>
            <input type="text" id="alias" placeholder="X-Trader">
        </div>
    </div>
    <div class="form-group">
        <label>EMAIL</label>
        <input type="email" id="regEmail" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="form-group">
        <label>PASSWORD</label>
        <input type="password" id="regPassword" placeholder="Min 8 characters" autocomplete="new-password">
        <div class="pw-strength">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
        </div>
        <div class="pw-label" id="pwLabel">—</div>
    </div>
    <div class="form-group">
        <label>CONFIRM PASSWORD</label>
        <input type="password" id="regConfirm" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <div class="form-group">
        <label>TRADING STYLE</label>
        <select id="tradingStyle">
            <option value="">Select your style (optional)</option>
            <option value="Scalper">Scalper</option>
            <option value="Day Trader">Day Trader</option>
            <option value="Swing Trader">Swing Trader</option>
            <option value="Position Trader">Position Trader</option>
        </select>
    </div>
    <div class="terms">
        <input type="checkbox" id="termsCheck">
        <span>I understand this journal stores my trade data in the cloud and I agree to keep my login credentials secure.</span>
    </div>
    <button class="btn-primary" id="registerBtn">CREATE ACCOUNT</button>
    <div class="divider">or</div>
    <div class="switch-link">Already have an account? <a href="/login.html">Sign in</a></div>
</div>

<script type="module">
import { signUp } from '/db.js';

function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg; el.style.display = 'block';
    document.getElementById('successBox').style.display = 'none';
}
function showSuccess(msg) {
    const el = document.getElementById('successBox');
    el.innerHTML = msg; el.style.display = 'block';
    document.getElementById('errorBox').style.display = 'none';
}

document.getElementById('regPassword').addEventListener('input', function() {
    const pw = this.value;
    const bars = [1,2,3,4].map(i => document.getElementById('bar' + i));
    const label = document.getElementById('pwLabel');
    bars.forEach(b => { b.className = 'pw-bar'; });
    if (!pw) { label.textContent = '—'; return; }
    let score = 0;
    if (pw.length >= 8) score++;
    if (pw.length >= 12) score++;
    if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
    if (/[^A-Za-z0-9]/.test(pw)) score++;
    const classes = ['','weak','fair','fair','strong'];
    const labels  = ['','Weak','Fair','Good','Strong'];
    for (let i = 0; i < score; i++) bars[i].classList.add(classes[score]);
    label.textContent = 'Strength: ' + (labels[score] || '—');
    label.style.color = score <= 1 ? '#E22134' : score <= 2 ? '#ffd600' : '#1DB954';
});

document.getElementById('registerBtn').addEventListener('click', async () => {
    const firstName = document.getElementById('firstName').value.trim();
    const alias     = document.getElementById('alias').value.trim();
    const email     = document.getElementById('regEmail').value.trim();
    const password  = document.getElementById('regPassword').value;
    const confirm   = document.getElementById('regConfirm').value;
    const style     = document.getElementById('tradingStyle').value;
    const agreed    = document.getElementById('termsCheck').checked;

    if (!firstName)           { showError('Please enter your first name.'); return; }
    if (!email)               { showError('Please enter your email.'); return; }
    if (password.length < 8)  { showError('Password must be at least 8 characters.'); return; }
    if (password !== confirm)  { showError('Passwords do not match.'); return; }
    if (!agreed)              { showError('Please accept the terms to continue.'); return; }

    const name = alias ? `${firstName} (${alias})` : firstName;
    const btn = document.getElementById('registerBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Creating account…';

    const result = await signUp(email, password, name, style);
    btn.disabled = false;
    btn.textContent = 'CREATE ACCOUNT';

    if (result.success) {
        showSuccess('✅ Account created!<br><br>Check your email to confirm your address, then sign in.');
        btn.style.display = 'none';
        setTimeout(() => location.href = '/login.html', 4000);
    } else {
        showError(result.error || 'Registration failed. Please try again.');
    }
});

document.addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('registerBtn').click();
});
</script>
</body>
</html>
