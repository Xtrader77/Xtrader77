<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | xX Trading</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#000000">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#000; color:#fff; min-height:100vh; padding:16px 16px 90px; }
        .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid rgba(255,255,255,0.08); }
        h1 { font-size:20px; font-weight:800; }
        .back-btn { background:transparent; border:1px solid rgba(255,255,255,0.2); color:rgba(255,255,255,0.7); padding:8px 16px; border-radius:50px; font-size:13px; cursor:pointer; text-decoration:none; font-family:'Inter',sans-serif; }
        .card { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:20px; margin-bottom:14px; }
        .card-title { font-size:13px; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,0.5); margin-bottom:16px; }
        .stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
        .stat-card { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:18px 14px; }
        .stat-value { font-size:32px; font-weight:800; }
        .stat-label { font-size:11px; font-weight:600; letter-spacing:0.8px; color:rgba(255,255,255,0.45); margin-top:4px; }
        .cycle-card { background:#111; border:1px solid rgba(255,255,255,0.05); border-radius:12px; padding:18px; margin-bottom:14px; }
        .cycle-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
        .cycle-label { font-size:11px; font-weight:700; letter-spacing:0.8px; color:rgba(255,255,255,0.4); }
        .cycle-val { font-size:14px; font-weight:700; }
        .progress-track { height:5px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
        .progress-fill  { height:100%; background:#fff; border-radius:3px; transition:width 0.4s; }
        .chart-wrap { position:relative; height:260px; }
        .export-row { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px; }
        .exp-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.12); color:rgba(255,255,255,0.7); padding:8px 14px; border-radius:50px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; transition:all 0.2s; }
        .exp-btn:hover { background:rgba(255,255,255,0.12); color:#fff; }
        /* Calendar */
        .cal-nav-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
        .cal-month { font-size:14px; font-weight:700; }
        .cal-nav-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.1); color:#fff; width:30px; height:30px; border-radius:50%; font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
        .cal-day-name { text-align:center; font-size:9px; font-weight:700; color:rgba(255,255,255,0.3); padding:5px 0; letter-spacing:0.8px; }
        .cal-cell { min-height:46px; background:rgba(255,255,255,0.02); border-radius:6px; border:1px solid rgba(255,255,255,0.04); padding:4px 3px 3px; display:flex; flex-direction:column; gap:2px; }
        .cal-cell.has-trades { cursor:pointer; border-color:rgba(255,255,255,0.1); }
        .cal-cell.has-trades:hover { background:rgba(255,255,255,0.05); }
        .cal-cell.today { border-color:rgba(255,255,255,0.3); }
        .cal-cell.other-month .cal-day-num { color:rgba(255,255,255,0.15); }
        .cal-cell.selected-day { border-color:#4A90E2; background:rgba(74,144,226,0.07); }
        .cal-day-num { font-size:10px; font-weight:600; color:rgba(255,255,255,0.45); }
        .cal-cell.today .cal-day-num { color:#fff; background:rgba(255,255,255,0.15); border-radius:3px; padding:1px 3px; display:inline-block; }
        .cal-dots { display:flex; gap:2px; flex-wrap:wrap; }
        .cal-dot { width:5px; height:5px; border-radius:50%; }
        .cal-dot.win  { background:#1DB954; }
        .cal-dot.loss { background:#E22134; }
        .cal-dot.be   { background:rgba(255,255,255,0.5); }
        .cal-detail { background:#1a1a1a; border:1px solid rgba(255,255,255,0.08); border-radius:10px; padding:16px; margin-top:12px; display:none; }
        .cal-detail.show { display:block; }
        .cal-detail-title { font-size:13px; font-weight:700; margin-bottom:12px; display:flex; justify-content:space-between; align-items:center; }
        .cal-close { background:none; border:none; color:rgba(255,255,255,0.4); font-size:18px; cursor:pointer; }
        .cal-pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:10px; }
        .cal-pill { font-size:11px; font-weight:700; padding:3px 10px; border-radius:12px; }
        .cal-pill.win  { background:rgba(29,185,84,0.15); color:#1DB954; }
        .cal-pill.loss { background:rgba(226,33,52,0.15); color:#E22134; }
        .cal-pill.be   { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.6); }
        .cal-trade-row { display:flex; align-items:center; gap:10px; padding:9px 10px; background:rgba(255,255,255,0.03); border-radius:7px; margin-bottom:6px; border:1px solid rgba(255,255,255,0.04); }
        .cal-outcome { font-size:10px; font-weight:800; padding:2px 8px; border-radius:3px; flex-shrink:0; }
        .cal-outcome.win  { background:rgba(29,185,84,0.2);  color:#1DB954; }
        .cal-outcome.loss { background:rgba(226,33,52,0.2);  color:#E22134; }
        .cal-outcome.be   { background:rgba(255,255,255,0.12); color:#fff; }
        .cal-trade-meta { flex:1; min-width:0; }
        .cal-trade-pair { font-size:12px; font-weight:700; }
        .cal-trade-sub  { font-size:10px; color:rgba(255,255,255,0.4); margin-top:1px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        /* Trade items */
        .trade-item { background:rgba(255,255,255,0.02); border:1px solid rgba(255,255,255,0.05); border-radius:10px; padding:16px; margin-bottom:12px; }
        .trade-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .trade-info { display:flex; align-items:center; gap:10px; }
        .outcome-badge { font-size:10px; font-weight:800; padding:3px 9px; border-radius:4px; }
        .outcome-win  { background:rgba(29,185,84,0.2);  color:#1DB954; }
        .outcome-loss { background:rgba(226,33,52,0.2);  color:#E22134; }
        .outcome-be   { background:rgba(255,255,255,0.15); color:#fff; }
        .trade-pair { font-size:14px; font-weight:700; }
        .trade-meta { font-size:12px; color:rgba(255,255,255,0.4); margin-bottom:8px; display:flex; flex-wrap:wrap; gap:8px; }
        .trade-notes { font-size:13px; color:rgba(255,255,255,0.7); line-height:1.6; margin-bottom:10px; background:rgba(255,255,255,0.02); border-radius:6px; padding:9px 12px; }
        .trade-row-meta { display:flex; gap:10px; flex-wrap:wrap; font-size:11px; color:rgba(255,255,255,0.45); margin-bottom:8px; }
        .checklist-badges { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
        .cl-badge { background:rgba(74,144,226,0.15); color:#4A90E2; font-size:10px; font-weight:700; padding:2px 7px; border-radius:3px; }
        .screenshots-wrap { display:flex; flex-wrap:wrap; gap:10px; margin-bottom:10px; }
        .ss-thumb { width:70px; height:52px; object-fit:cover; border-radius:5px; border:1px solid rgba(255,255,255,0.1); cursor:pointer; transition:all 0.2s; }
        .ss-thumb:hover { border-color:rgba(255,255,255,0.4); transform:scale(1.06); }
        .trade-actions { display:flex; gap:8px; }
        .dup-btn { background:rgba(74,144,226,0.12); border:1px solid rgba(74,144,226,0.3); color:#4A90E2; padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }
        .del-btn { background:rgba(226,33,52,0.1); border:1px solid rgba(226,33,52,0.25); color:#E22134; padding:5px 12px; border-radius:6px; font-size:12px; cursor:pointer; font-family:'Inter',sans-serif; }
        .back-dated { font-size:9px; font-weight:700; color:#ffd600; border:1px solid rgba(255,214,0,0.3); border-radius:10px; padding:1px 7px; }
        .empty-state { text-align:center; padding:40px 20px; color:rgba(255,255,255,0.3); font-size:14px; }
    </style>
</head>
<body>
<div class="header">
    <h1>DASHBOARD</h1>
    <a href="/" class="back-btn">← HOME</a>
</div>

<div class="export-row">
    <button class="exp-btn" id="xlsxBtn">📊 Excel</button>
    <button class="exp-btn" id="pdfBtn">📄 PDF</button>
    <button class="exp-btn" id="csvBtn">📋 CSV</button>
</div>

<!-- Cycle -->
<div class="cycle-card">
    <div class="cycle-row">
        <span class="cycle-label">CYCLE PROGRESS</span>
        <span class="cycle-val">Cycle <span id="cycleNum">1</span> · <span id="cycleTrades">0</span>/20</span>
    </div>
    <div class="progress-track"><div class="progress-fill" id="cycleBar" style="width:0%"></div></div>
</div>

<!-- Stats -->
<div class="stats-grid">
    <div class="stat-card"><div class="stat-value" id="totalTrades">0</div><div class="stat-label">TOTAL TRADES</div></div>
    <div class="stat-card"><div class="stat-value" id="winRate">0%</div><div class="stat-label">WIN RATE</div></div>
    <div class="stat-card"><div class="stat-value" id="avgWinStreak">0</div><div class="stat-label">AVG WIN STREAK</div></div>
    <div class="stat-card"><div class="stat-value" id="avgLossStreak">0</div><div class="stat-label">AVG LOSS STREAK</div></div>
</div>

<!-- Chart -->
<div class="card">
    <div class="card-title">WIN / LOSS DISTRIBUTION</div>
    <div class="chart-wrap"><canvas id="wlChart"></canvas></div>
</div>

<!-- Calendar -->
<div class="card">
    <div class="cal-nav-row">
        <button class="cal-nav-btn" id="calPrev">‹</button>
        <div class="cal-month" id="calMonthLabel"></div>
        <button class="cal-nav-btn" id="calNext">›</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
    <div class="cal-detail" id="calDetail">
        <div class="cal-detail-title">
            <span id="calDetailTitle"></span>
            <button class="cal-close" id="calClose">×</button>
        </div>
        <div class="cal-pills" id="calPills"></div>
        <div id="calTrades"></div>
    </div>
</div>

<!-- Recent Trades -->
<div class="card">
    <div class="card-title">RECENT TRADES</div>
    <div id="tradesList"></div>
</div>

<!-- Screenshot modal -->
<div id="ssModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:9999;display:none;align-items:center;justify-content:center;padding:16px;">
    <img id="ssModalImg" style="max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain;">
    <button id="ssModalClose" style="position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:#fff;width:38px;height:38px;border-radius:50%;font-size:22px;cursor:pointer;">×</button>
</div>

<script type="module">
import { requireAuth, requirePin, showToast, syncToLocalStorage, injectBottomNav } from '/shared.js';
import { deleteTrade as cloudDeleteTrade, saveCycles, loadAllTrades, loadCycles } from '/db.js';

injectBottomNav('dashboard');

let journals = { journals: {}, tradeCounter: 1 };
let cycles   = { currentCycle:1, tradesInCurrentCycle:0, completedCycles:[], allTrades:[] };
let calYear, calMonth;

(async () => {
    const user = await requireAuth('/dashboard.html');
    if (!user) return;
    await requirePin();
    await syncToLocalStorage();
    loadLocal();
    init();
})();

function loadLocal() {
    try {
        const j = JSON.parse(localStorage.getItem('xX_journal_data') || '{}');
        if (j.journals) journals = j;
        const c = JSON.parse(localStorage.getItem('xX_cycle_data') || '{}');
        if (c.currentCycle) cycles = c;
    } catch(e) {}
}

function init() {
    updateCycle();
    updateStats();
    renderChart();
    renderTrades();
    initCalendar();
    setupExports();
}

function updateCycle() {
    document.getElementById('cycleNum').textContent    = cycles.currentCycle;
    document.getElementById('cycleTrades').textContent = cycles.tradesInCurrentCycle;
    document.getElementById('cycleBar').style.width    = Math.min((cycles.tradesInCurrentCycle/20)*100,100)+'%';
}

function updateStats() {
    const trades = Object.values(journals.journals);
    const total  = trades.length;
    const wins   = trades.filter(t => t.outcome==='WIN').length;
    const wr     = total > 0 ? ((wins/total)*100).toFixed(1) : 0;
    document.getElementById('totalTrades').textContent = total;
    document.getElementById('winRate').textContent     = wr + '%';

    // Streaks
    const outcomes = trades.map(t => t.outcome);
    let curType = null, curLen = 0, winStreaks = [], lossStreaks = [];
    outcomes.forEach(o => {
        if (o === curType) { curLen++; }
        else {
            if (curType === 'WIN'  && curLen) winStreaks.push(curLen);
            if (curType === 'LOSS' && curLen) lossStreaks.push(curLen);
            curType = o; curLen = 1;
        }
    });
    if (curType === 'WIN'  && curLen) winStreaks.push(curLen);
    if (curType === 'LOSS' && curLen) lossStreaks.push(curLen);
    const avg = arr => arr.length ? (arr.reduce((a,b)=>a+b,0)/arr.length).toFixed(1) : '0';
    document.getElementById('avgWinStreak').textContent  = avg(winStreaks);
    document.getElementById('avgLossStreak').textContent = avg(lossStreaks);
}

function renderChart() {
    const trades = Object.values(journals.journals);
    const wins = trades.filter(t=>t.outcome==='WIN').length;
    const losses = trades.filter(t=>t.outcome==='LOSS').length;
    const bes  = trades.filter(t=>t.outcome==='BREAKEVEN').length;
    const ctx  = document.getElementById('wlChart');
    if (trades.length === 0) {
        ctx.parentElement.innerHTML = '<div class="empty-state">No trades yet</div>';
        return;
    }
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['Wins','Losses','Breakevens'],
            datasets: [{ data:[wins,losses,bes], backgroundColor:['#1DB954','#E22134','#555'], borderWidth:0, hoverOffset:4 }]
        },
        options: {
            responsive:true, maintainAspectRatio:false,
            plugins: {
                legend: { position:'bottom', labels:{ color:'#fff', font:{ size:12 }, padding:20 } }
            },
            cutout:'70%'
        }
    });
}

function renderTrades() {
    const trades = Object.values(journals.journals)
        .sort((a,b) => new Date(b.timestamp)-new Date(a.timestamp))
        .slice(0,15);
    // Ensure screenshots are arrays (not undefined)
    trades.forEach(t => { if (!Array.isArray(t.screenshots)) t.screenshots = []; });
    const container = document.getElementById('tradesList');
    if (!trades.length) { container.innerHTML = '<div class="empty-state">No trades recorded yet</div>'; return; }

    container.innerHTML = trades.map(t => {
        const dt = new Date(t.timestamp);
        const dateStr = dt.toLocaleDateString();
        const timeStr = dt.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
        const ocCls   = t.outcome==='WIN' ? 'win' : t.outcome==='LOSS' ? 'loss' : 'be';
        const mindsetLabels = ['','😤 Frustrated','😟 Off','😐 Neutral','😊 Focused','🔥 In zone'];
        const ssHtml = t.screenshots?.length ? `
            <div class="screenshots-wrap">
                ${t.screenshots.map((ss,i) => ss.data ? `<img class="ss-thumb" src="${ss.data}" data-trade="${t.tradeId}" data-idx="${i}" title="${ss.annotation||'Screenshot '+(i+1)}">` : '').join('')}
            </div>` : '';
        const clHtml = t.checklist?.length ? `<div class="checklist-badges">${t.checklist.map(c=>`<div class="cl-badge">${c}</div>`).join('')}</div>` : '';
        const mindHtml = t.mindset ? `<span>🧠 ${mindsetLabels[t.mindset]||t.mindset}</span>` : '';
        const rateHtml = t.executionRating ? `<span>⭐ ${t.executionRating}/5</span>` : '';
        const ruleHtml = t.ruleBreaks?.length ? `<span style="color:${t.ruleBreaks.includes('No Rule Break')?'#1DB954':'#ff6b6b'}">⚠ ${t.ruleBreaks.join(', ')}</span>` : '';
        const bdHtml   = t.isBackdated ? '<span class="back-dated">BACKDATED</span>' : '';
        return `
            <div class="trade-item" id="trade-${t.tradeId}">
                <div class="trade-head">
                    <div class="trade-info">
                        <span class="outcome-badge outcome-${ocCls}">${t.outcome}</span>
                        <span class="trade-pair">${t.pair} ${t.direction}</span>
                        ${bdHtml}
                    </div>
                    <div class="trade-actions">
                        <button class="dup-btn" onclick="location.href='/journal.html?duplicate=1&tradeId=${t.tradeId}'">Dup</button>
                        <button class="del-btn" onclick="doDelete('${t.tradeId}')">Del</button>
                    </div>
                </div>
                <div class="trade-meta">
                    <span>📅 ${dateStr} ${timeStr}</span>
                    ${t.tradeSession?.session ? `<span>🕒 ${t.tradeSession.session.toUpperCase()}</span>` : ''}
                    ${t.execution ? `<span>${t.execution==='limit'?'🎯':'⚡'} ${t.execution}</span>` : ''}
                </div>
                <div class="trade-notes">${t.text || 'No notes'}</div>
                ${mindHtml||rateHtml||ruleHtml ? `<div class="trade-row-meta">${mindHtml}${rateHtml}${ruleHtml}</div>` : ''}
                ${clHtml}${ssHtml}
            </div>`;
    }).join('');

    // Screenshot click → modal
    document.querySelectorAll('.ss-thumb').forEach(img => {
        img.addEventListener('click', () => {
            const modal = document.getElementById('ssModal');
            document.getElementById('ssModalImg').src = img.src;
            modal.style.display = 'flex';
        });
    });
}

document.getElementById('ssModalClose').addEventListener('click', () => {
    document.getElementById('ssModal').style.display = 'none';
});
document.getElementById('ssModal').addEventListener('click', e => {
    if (e.target === document.getElementById('ssModal'))
        document.getElementById('ssModal').style.display = 'none';
});

window.doDelete = async (tradeId) => {
    if (!confirm('Delete this trade? Cannot be undone.')) return;
    const trade = journals.journals[tradeId];
    delete journals.journals[tradeId];
    const idx = cycles.allTrades.indexOf(tradeId);
    if (idx > -1) cycles.allTrades.splice(idx, 1);
    const inCompleted = cycles.completedCycles?.some(c => c.cycleNumber === trade?.cycleNumber);
    if (!inCompleted) cycles.tradesInCurrentCycle = Math.max(0, cycles.tradesInCurrentCycle - 1);
    localStorage.setItem('xX_journal_data', JSON.stringify(journals));
    localStorage.setItem('xX_cycle_data', JSON.stringify(cycles));
    showToast('Trade deleted', 'success');
    try {
        await cloudDeleteTrade(tradeId);
        await saveCycles(cycles);
    } catch(e) { showToast('Cloud delete failed', 'error'); }
    setTimeout(() => location.reload(), 500);
};

// ── Calendar ─────────────────────────────────────────────────────────────────
function initCalendar() {
    const now = new Date();
    calYear = now.getFullYear(); calMonth = now.getMonth();
    renderCalendar();
    document.getElementById('calPrev').addEventListener('click', () => { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(); closeDetail(); });
    document.getElementById('calNext').addEventListener('click', () => { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(); closeDetail(); });
    document.getElementById('calClose').addEventListener('click', closeDetail);
}

function buildTradeMap() {
    const map = {};
    Object.values(journals.journals).forEach(t => {
        const key = t.tradeDate || t.timestamp.split('T')[0];
        if (!map[key]) map[key] = [];
        map[key].push(t);
    });
    return map;
}

function renderCalendar() {
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS   = ['S','M','T','W','T','F','S'];
    document.getElementById('calMonthLabel').textContent = `${MONTHS[calMonth]} ${calYear}`;
    const tradeMap = buildTradeMap();
    const todayStr = new Date().toISOString().split('T')[0];
    const firstDay = new Date(calYear, calMonth, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
    const daysInPrev  = new Date(calYear, calMonth, 0).getDate();

    let html = DAYS.map(d => `<div class="cal-day-name">${d}</div>`).join('');

    for (let p = firstDay-1; p >= 0; p--) {
        const d = daysInPrev - p;
        const y = calMonth===0 ? calYear-1 : calYear;
        const m = calMonth===0 ? 12 : calMonth;
        html += buildCell(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, d, true, todayStr, tradeMap);
    }
    for (let d = 1; d <= daysInMonth; d++) {
        html += buildCell(`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`, d, false, todayStr, tradeMap);
    }
    const total = firstDay + daysInMonth;
    const rem   = total % 7 === 0 ? 0 : 7 - (total % 7);
    for (let d = 1; d <= rem; d++) {
        const y = calMonth===11 ? calYear+1 : calYear;
        const m = calMonth===11 ? 1 : calMonth+2;
        html += buildCell(`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`, d, true, todayStr, tradeMap);
    }

    document.getElementById('calGrid').innerHTML = html;
    document.querySelectorAll('.cal-cell.has-trades').forEach(cell => {
        cell.addEventListener('click', () => openDetail(cell.dataset.date, tradeMap));
    });
}

function buildCell(key, dayNum, otherMonth, todayStr, tradeMap) {
    const trades = tradeMap[key] || [];
    let cls = 'cal-cell';
    if (otherMonth) cls += ' other-month';
    if (key === todayStr) cls += ' today';
    if (trades.length) cls += ' has-trades';
    const dots = trades.slice(0,5).map(t => {
        const c = t.outcome==='WIN'?'win':t.outcome==='LOSS'?'loss':'be';
        return `<div class="cal-dot ${c}"></div>`;
    }).join('');
    return `<div class="${cls}" data-date="${key}"><div class="cal-day-num">${dayNum}</div><div class="cal-dots">${dots}</div></div>`;
}

function openDetail(dateKey, tradeMap) {
    const trades = (tradeMap || buildTradeMap())[dateKey] || [];
    if (!trades.length) return;
    document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected-day'));
    document.querySelector(`.cal-cell[data-date="${dateKey}"]`)?.classList.add('selected-day');
    const [y,m,d] = dateKey.split('-');
    document.getElementById('calDetailTitle').textContent = new Date(y,m-1,d).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
    const wins = trades.filter(t=>t.outcome==='WIN').length;
    const losses = trades.filter(t=>t.outcome==='LOSS').length;
    const bes  = trades.filter(t=>t.outcome==='BREAKEVEN').length;
    document.getElementById('calPills').innerHTML = [
        wins?`<div class="cal-pill win">✓ ${wins} WIN${wins>1?'S':''}</div>`:'',
        losses?`<div class="cal-pill loss">✗ ${losses} LOSS${losses>1?'ES':''}</div>`:'',
        bes?`<div class="cal-pill be">— ${bes} BE</div>`:''
    ].join('');
    document.getElementById('calTrades').innerHTML = trades.map(t => {
        const cls = t.outcome==='WIN'?'win':t.outcome==='LOSS'?'loss':'be';
        return `<div class="cal-trade-row">
            <div class="cal-outcome ${cls}">${t.outcome}</div>
            <div class="cal-trade-meta">
                <div class="cal-trade-pair">${t.pair} ${t.direction}</div>
                <div class="cal-trade-sub">${t.tradeTime||''} ${t.tradeSession?.session?.toUpperCase()||''} ${t.reason?'· '+t.reason:''}</div>
            </div>
        </div>`;
    }).join('');
    document.getElementById('calDetail').classList.add('show');
    document.getElementById('calDetail').scrollIntoView({behavior:'smooth',block:'nearest'});
}

function closeDetail() {
    document.getElementById('calDetail').classList.remove('show');
    document.querySelectorAll('.cal-cell').forEach(c => c.classList.remove('selected-day'));
}

// ── Exports ───────────────────────────────────────────────────────────────────
function setupExports() {
    document.getElementById('csvBtn').addEventListener('click', exportCSV);
    document.getElementById('xlsxBtn').addEventListener('click', exportXLSX);
    document.getElementById('pdfBtn').addEventListener('click', exportPDF);
}

function buildRows() {
    const mindsetLabel = v => (['','Frustrated','Off','Neutral','Focused','In zone'][v]||'N/A');
    return Object.values(journals.journals).sort((a,b)=>new Date(a.timestamp)-new Date(b.timestamp)).map(t => ({
        'ID':          t.tradeId,
        'Date':        new Date(t.timestamp).toLocaleDateString(),
        'Time':        new Date(t.timestamp).toLocaleTimeString(),
        'Pair':        t.pair||'N/A',
        'Direction':   t.direction||'N/A',
        'Outcome':     t.outcome,
        'Execution':   t.execution||'N/A',
        'Session':     t.tradeSession?.session?.toUpperCase()||'N/A',
        'Mindset':     mindsetLabel(t.mindset),
        'Exec Rating': t.executionRating||'N/A',
        'Rule Breaks': (t.ruleBreaks||[]).join(', ')||'None',
        'Checklist':   (t.checklist||[]).join(', ')||'None',
        'Reason':      t.reason||'',
        'Notes':       t.text||''
    }));
}

function exportCSV() {
    const rows = buildRows();
    if (!rows.length) { showToast('No trades to export','error'); return; }
    const headers = Object.keys(rows[0]);
    const csv = [headers.join(','), ...rows.map(r => headers.map(h => `"${String(r[h]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
    const a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download = `xX_Dashboard_${new Date().toISOString().split('T')[0]}.csv`;
    a.click();
    showToast('CSV exported ✓','success');
}

function exportXLSX() {
    if (!window.XLSX) { showToast('XLSX library not loaded','error'); return; }
    const rows = buildRows();
    if (!rows.length) { showToast('No trades to export','error'); return; }
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(rows), 'Trades');
    XLSX.writeFile(wb, `xX_Dashboard_${new Date().toISOString().split('T')[0]}.xlsx`);
    showToast('Excel exported ✓','success');
}

function exportPDF() {
    if (!window.jspdf) { showToast('PDF library not loaded','error'); return; }
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const rows = buildRows();
    const trades = Object.values(journals.journals);
    const wins   = trades.filter(t=>t.outcome==='WIN').length;
    const total  = trades.length;

    doc.setFontSize(18); doc.setFont(undefined,'bold');
    doc.text('xX Trading Journal — Dashboard', 14, 20);
    doc.setFontSize(10); doc.setFont(undefined,'normal');
    doc.text(`Generated: ${new Date().toLocaleDateString()} | Total Trades: ${total} | Win Rate: ${total?((wins/total)*100).toFixed(1):0}%`, 14, 30);

    if (rows.length) {
        const cols = ['Date','Time','Pair','Direction','Outcome','Session','Exec Rating','Reason'];
        doc.autoTable({
            startY: 36,
            head: [cols],
            body: rows.map(r => cols.map(c => r[c]||'')),
            theme: 'grid',
            headStyles: { fillColor:[10,10,10], textColor:255, fontSize:8 },
            bodyStyles: { fontSize:8 }
        });
    }
    doc.save(`xX_Dashboard_${new Date().toISOString().split('T')[0]}.pdf`);
    showToast('PDF exported ✓','success');
}
</script>
